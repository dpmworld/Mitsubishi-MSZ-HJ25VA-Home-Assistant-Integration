substitutions:
  mac: <macaddress>
  room: room
  room_display: Room
  name: msz-ay25-${room}
  friendly_name: Mitsubishi MSZ-AY25 ${room_display}
  id_name: hvac_ay25_${mac}
  time_timezone: "Europe/Rome"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: False

esp32:
  board: esp32-s3-devkitc-1
  framework:
    #type: arduino
    type: esp-idf
    #version: 5.4.0

# Enable logging — verbose on CN105 internals for protocol debugging
logger:
#  level: INFO
  logs:
    CN105Climate: INFO
    CN105: INFO
    SETTINGS: INFO
    CYCLE: INFO
    Header: INFO
    EVT_SETS: INFO
    sensor: INFO
    chkSum: INFO
    WRITE: INFO
    READ: INFO
    Decoder: INFO

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

time:
  - platform: homeassistant
    timezone: ${time_timezone}

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # SSID is MAC-differentiated so multiple ESPs in fallback don't collide.
  ap:
    ssid: "Msz-AY25 ${mac} Fallback"
    password: !secret esp_password

captive_portal:

web_server:
  version: 3
  include_internal: True
  auth:
    username: !secret esp_username
    password: !secret esp_password

uart:
  id: HP_UART
  baud_rate: 2400
  tx_pin: GPIO1
  rx_pin: GPIO2

external_components:
  - source: github://echavet/MitsubishiCN105ESPHome

# Climate entity configuration
#
#  CLIMATE_MODE_OFF = 0
#  CLIMATE_MODE_HEAT_COOL = 1   (auto, dual setpoint)
#  CLIMATE_MODE_COOL = 2
#  CLIMATE_MODE_HEAT = 3
#  CLIMATE_MODE_FAN_ONLY = 4
#  CLIMATE_MODE_DRY = 5
#  CLIMATE_MODE_AUTO = 6        (auto, single setpoint)
#
# ── i-Save note ─────────────────────────────────────────────────────────────
# The AY series remote has an "i-Save" button that recalls a low-power preset
# (typically HEAT at ~10°C or COOL at ~31°C, fan QUIET). The echavet/CN105
# fork does NOT expose this as a dedicated entity — it's a remote-only macro.
# To replicate it in HA, create a script that sets:
#   service: climate.set_temperature
#     target_temp: 10     (or 31 in cooling)
#     hvac_mode: heat     (or cool)
#   service: climate.set_fan_mode
#     fan_mode: quiet
# ── Timers ─────────────────────────────────────────────────────────────────
# On/off timers and weekly schedules are implemented in HA (input_datetime +
# automations) — NOT on the ESP. State survives reboots and is editable from
# the UI.
# ── AY-specific features NOT in this base ──────────────────────────────────
# - circulator_switch: AY50 only — do NOT add for AY25/35/42.
# - hardware_settings codes 101/102: not supported on AY series (jumpers only,
#   no CN105 service code table). Adding them produces permanent "unknown".
# - isee_sensor: not present on AY series (higher-end lines only).
# ───────────────────────────────────────────────────────────────────────────
climate:
  - platform: cn105
    id: hp_${mac}
    name: ${friendly_name}
    icon: mdi:heat-pump
    uart_id: HP_UART

    on_state:
      - logger.log: "STATUS UPDATE"
      # LED color logic centralized in script:update_led_for_mode so it's
      # reusable both here and from the connection-lost recovery handler.
      - script.execute: update_led_for_mode

    supports:
      mode: [AUTO, COOL, HEAT, DRY, FAN_ONLY]
      fan_mode: [AUTO, QUIET, LOW, MEDIUM, HIGH]
      swing_mode: ["OFF", VERTICAL]
      horizontal_vane_mode: ["←←", "←", "|", "→", "→→", SWING]

    visual:
      min_temperature: 10
      max_temperature: 31
      temperature_step:
        target_temperature: 1
        current_temperature: 0.1

    update_interval: 4s
    debounce_delay: 500ms

    hp_uptime_connection_sensor:
      id: hp_uptime_connection
      name: Uptime Connection
    compressor_frequency_sensor:
      name: Compressor Frequency
      entity_category: diagnostic
    outside_air_temperature_sensor:
      name: Outside Air Temp
    input_power_sensor:
      name: Input Power
    kwh_sensor:
      name: Energy Usage
    runtime_hours_sensor:
      name: Runtime Hours
      entity_category: diagnostic

    stage_sensor:
      name: Stage
      entity_category: diagnostic
    sub_mode_sensor:
      name: Sub Mode
      entity_category: diagnostic
    auto_sub_mode_sensor:
      name: Auto Sub Mode
      entity_category: diagnostic

    vertical_vane_select:
      name: Vertical Vane
    horizontal_vane_select:
      name: Horizontal Vane
    airflow_control_select:
      name: Airflow Control
      entity_category: config

    # VGKP suffix only: air_purifier_switch requires Plasma Quad device on CN1T1.
    # Remove for non-VGKP units.
    air_purifier_switch:
      name: Air Purifier
    night_mode_switch:
      name: Night Mode

text_sensor:
  - platform: version
    name: "ESPHome version"
    hide_timestamp: True
    disabled_by_default: True
  - platform: wifi_info
    ssid:
      name: "Connected SSID"
      id: ${id_name}_connected_ssid
      entity_category: "diagnostic"
      disabled_by_default: True
    ip_address:
      name: "IP Address"
      id: ${id_name}_ip_addr
      entity_category: "diagnostic"
      disabled_by_default: True
    bssid:
      name: "Connected BSSID"
      id: ${id_name}_bssid
      entity_category: "diagnostic"
      disabled_by_default: True
    mac_address:
      name: "Mac Wifi Address"
      id: ${id_name}_mac_addr
      entity_category: "diagnostic"
      disabled_by_default: True

sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: ${id_name}_wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
    disabled_by_default: True

  - platform: copy
    source_id: ${id_name}_wifi_signal_db
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""
    disabled_by_default: True

  - platform: uptime
    name: ${name} Uptime
    entity_category: diagnostic
    disabled_by_default: True

# On-board WS2812C-2020 RGB LED on Atom S3 Lite (GPIO35, single LED chip)
light:
  - platform: esp32_rmt_led_strip
    name: Led
    id: led
    internal: true
    rgb_order: GRB
    pin: 35
    num_leds: 1
    chipset: ws2812
    effects:
      # Smooth magenta pulse used when CN105 serial connection is lost.
      - pulse:
          name: "connection_lost"
          transition_length: 1s
          update_interval: 1s
          min_brightness: 0%
          max_brightness: 50%

button:
  - platform: restart
    name: "Restart"
    id: device_restart
    disabled_by_default: True
    entity_category: "diagnostic"

switch:
  - platform: template
    id: led_switch
    name: Status Led
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

# Atom S3 Lite back-side button (GPIO41, active-low, internal pullup)
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO41
      inverted: true
      mode:
        input: true
        pullup: true
    name: Atom Button
    entity_category: diagnostic
    disabled_by_default: True
    on_click:
      - min_length: 5s
        max_length: 60s
        then:
          - button.press: device_restart

# ──────────────────────────────────────────────────────────────────────────
# LED state machine
#
# Two sources can drive the LED:
#   (a) Normal operation → update_led_for_mode (called by climate.on_state)
#       sets a static color based on the AC mode, respecting led_switch.
#   (b) Connection-lost alarm → interval polls hp_uptime_connection every 5s
#       and, if the value doesn't increment for 15s, forces a magenta
#       pulse effect on the LED — overriding led_switch=OFF, since this
#       is a critical alert.
#
# Recovery: when connection is restored, the interval clears the effect
# and re-invokes update_led_for_mode to restore the mode color.
# ──────────────────────────────────────────────────────────────────────────
script:
  - id: update_led_for_mode
    then:
      - lambda: |-
          // Respect the user's master LED toggle for normal operation.
          if (!id(led_switch).state) {
            id(led).turn_off().perform();
            return;
          }
          auto mode = id(hp_${mac}).mode;
          switch (mode) {
            case 0: // OFF
              id(led).turn_off().perform();
              break;
            case 1: // HEAT_COOL (auto dual setpoint)
              id(led).turn_on().set_rgb(.3,1,.3).perform();
              id(led).turn_on().set_brightness(.3).perform();
              break;
            case 2: // COOL
              id(led).turn_on().set_rgb(0,0,1).perform();
              id(led).turn_on().set_brightness(.3).perform();
              break;
            case 3: // HEAT
              id(led).turn_on().set_rgb(.8,0,0).perform();
              id(led).turn_on().set_brightness(.3).perform();
              break;
            case 4: // FAN_ONLY
              id(led).turn_on().set_rgb(1,1,1).perform();
              id(led).turn_on().set_brightness(.3).perform();
              break;
            case 5: // DRY
              id(led).turn_on().set_rgb(.7,.85,1).perform();
              id(led).turn_on().set_brightness(.3).perform();
              break;
            case 6: // AUTO
              id(led).turn_on().set_rgb(.3,1,1).perform();
              id(led).turn_on().set_brightness(.3).perform();
              break;
            default:
              id(led).turn_on().set_rgb(.3,.3,.3).perform();
              id(led).turn_on().set_brightness(.3).perform();
              ESP_LOGD("main", "Unknown mode for LED color mapping");
              break;
          }

interval:
  - interval: 5s
    then:
      - lambda: |-
          // Connection-lost alarm: pulse magenta if hp_uptime_connection
          // hasn't incremented for 15 seconds (3 × 5s polls).
          static float last_uptime = -1.0f;
          static int stale_count = 0;
          static bool was_lost = false;

          float uptime = id(hp_uptime_connection).state;

          if (isnan(uptime) || uptime <= last_uptime) {
            stale_count++;
          } else {
            stale_count = 0;
          }
          if (!isnan(uptime)) last_uptime = uptime;

          bool is_lost = stale_count >= 3;  // 3 × 5s = 15s threshold

          if (is_lost && !was_lost) {
            ESP_LOGW("alarm", "CN105 connection lost — pulsing magenta");
            auto call = id(led).turn_on();
            call.set_rgb(1.0f, 0.0f, 0.6f);  // magenta
            call.set_brightness(0.5f);
            call.set_effect("connection_lost");
            call.perform();
          } else if (!is_lost && was_lost) {
            ESP_LOGI("alarm", "CN105 connection restored");
            auto call = id(led).turn_on();
            call.set_effect("None");
            call.perform();
            id(update_led_for_mode).execute();
          }

          was_lost = is_lost;
